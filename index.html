<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tu Yo del Futuro</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, system-ui, sans-serif;
    }

    body {
      background: linear-gradient(180deg, #f8fafc, #e2e8f0);
      min-height: 100vh;
      color: #0f172a;
      overflow-x: hidden;
    }

    .app {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      padding: 18px 14px 40px;
    }

    .card {
      background: rgba(255,255,255,0.84);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(15,23,42,0.08);
      border-radius: 28px;
      padding: 22px;
      box-shadow: 0 20px 50px rgba(15,23,42,0.08);
      margin-top: 8px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      gap: 10px;
    }

    .pill {
      background: rgba(59,130,246,0.10);
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
    }

    .emoji {
      font-size: 62px;
      text-align: center;
      margin-top: 8px;
    }

    h1 {
      font-size: 32px;
      line-height: 1.05;
      margin-bottom: 10px;
      text-align: center;
    }

    h2 {
      font-size: 24px;
      margin-bottom: 10px;
      text-align: center;
    }

    .description {
      font-size: 15px;
      line-height: 1.45;
      opacity: 0.75;
      text-align: center;
      margin-bottom: 22px;
    }

    .question {
      font-size: 18px;
      line-height: 1.4;
      text-align: center;
      margin-bottom: 20px;
      font-weight: 600;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    button {
      border: none;
      border-radius: 18px;
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .primary {
      background: #2563eb;
      color: white;
    }

    .primary:hover {
      transform: translateY(-2px);
    }

    .option {
      background: rgba(255,255,255,0.95);
      border: 1px solid rgba(15,23,42,0.08);
      color: #0f172a;
      text-align: left;
    }

    .option:hover {
      transform: scale(1.01);
      background: #ffffff;
    }

    .future-box {
      margin-top: 18px;
      background: linear-gradient(135deg, rgba(59,130,246,0.12), rgba(34,197,94,0.10));
      border-radius: 20px;
      padding: 16px;
    }

    .future-title {
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.08em;
      opacity: 0.7;
      margin-bottom: 8px;
    }

    .future-avatar {
      font-size: 44px;
      margin-bottom: 10px;
    }

    .future-text {
      font-size: 14px;
      line-height: 1.45;
      opacity: 0.85;
    }

    .progress {
      width: 100%;
      height: 12px;
      background: rgba(15,23,42,0.08);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 10px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #2563eb, #22c55e);
      width: 0%;
      transition: 0.25s ease;
    }

    .result-score {
      font-size: 56px;
      text-align: center;
      margin: 10px 0 14px;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
    }

    .stat {
      background: rgba(255,255,255,0.92);
      border-radius: 18px;
      padding: 14px;
      border: 1px solid rgba(15,23,42,0.06);
    }

    .stat-label {
      font-size: 12px;
      opacity: 0.6;
      margin-bottom: 6px;
      font-weight: 700;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 800;
    }

    .hidden {
      display: none;
    }

    @media (max-height: 740px) {
      .emoji {
        font-size: 50px;
      }

      h1 {
        font-size: 26px;
      }

      .card {
        padding: 18px;
      }

      button {
        padding: 12px 14px;
      }

      .question {
        font-size: 16px;
      }
    }

    @media (max-width: 420px) {
      .app {
        padding-top: 10px;
      }

      .card {
        border-radius: 24px;
        padding: 16px;
      }

      .emoji {
        font-size: 46px;
      }

      h1 {
        font-size: 24px;
      }

      .description {
        font-size: 14px;
      }

      .question {
        font-size: 16px;
      }

      button {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>

  <div class="app">

    <div id="start-screen" class="card">
      <div class="emoji">🐜💸🚲</div>
      <h1>Tu Yo del Futuro</h1>
      <p class="description">
        Descubre cómo tus pequeños gastos diarios pueden cambiar tu vida en unos años.
      </p>

      <button class="primary" onclick="startGame()">
        Empezar partida
      </button>
    </div>

    <div id="game-screen" class="card hidden">

      <div class="topbar">
        <div class="pill" id="question-counter">1 / 10</div>
        <div class="pill">🐜 <span id="ants-count">0</span></div>
      </div>

      <div class="progress">
        <div class="progress-fill" id="progress-fill"></div>
      </div>

      <div class="emoji" id="scenario-emoji">🍔</div>

      <h2 id="scenario-title">Título</h2>

      <div class="question" id="scenario-text">
        Pregunta
      </div>

      <div class="options" id="options-container"></div>

      <div class="future-box">
        <div class="future-title">TU YO DEL FUTURO</div>

        <div class="future-avatar" id="future-avatar">🙂</div>

        <div class="future-text" id="future-text">
          Tus decisiones están construyendo hábitos financieros.
        </div>
      </div>

    </div>

    <div id="result-screen" class="card hidden">
      <div class="emoji">🔮</div>

      <h1>Tu resultado</h1>

      <div class="result-score" id="result-emoji">🚲</div>

      <p class="description" id="result-description"></p>

      <div class="stats">
        <div class="stat">
          <div class="stat-label">Hormigas</div>
          <div class="stat-value" id="final-ants">0</div>
        </div>

        <div class="stat">
          <div class="stat-label">Dinero</div>
          <div class="stat-value" id="final-money">0</div>
        </div>
      </div>

      <div style="height:16px"></div>

      <button class="primary" onclick="restartGame()">
        Jugar otra vez
      </button>
    </div>

  </div>

<script>

let scenarios = [];
let selectedScenarios = [];
let currentQuestion = 0;

let state = {
  money: 0,
  ants: 0,
  impulse: 0,
  discipline: 0,
  futureVision: 0,
  socialPressure: 0,
  emotionalSpending: 0,
  planning: 0
};

async function loadScenarios() {
  const response = await fetch('scenarios.json');
  const data = await response.json();
  scenarios = data.scenarios;
}

function shuffle(array) {
  const arr = [...array];

  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }

  return arr;
}

function weightedShuffle(items) {
  const expanded = [];

  items.forEach(item => {
    const weight = item.weight || 1;

    for (let i = 0; i < weight; i++) {
      expanded.push(item);
    }
  });

  return shuffle(expanded);
}

async function startGame() {

  if (scenarios.length === 0) {
    await loadScenarios();
  }

  resetState();

  const mixed = weightedShuffle(scenarios);

  const unique = [];
  const ids = new Set();

  for (const item of mixed) {
    if (!ids.has(item.id)) {
      ids.add(item.id);
      unique.push(item);
    }

    if (unique.length >= 10) break;
  }

  selectedScenarios = unique;

  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('result-screen').classList.add('hidden');
  document.getElementById('game-screen').classList.remove('hidden');

  currentQuestion = 0;

  renderQuestion();
}

function resetState() {
  state = {
    money: 0,
    ants: 0,
    impulse: 0,
    discipline: 0,
    futureVision: 0,
    socialPressure: 0,
    emotionalSpending: 0,
    planning: 0
  };
}

function renderQuestion() {

  const scenario = selectedScenarios[currentQuestion];

  document.getElementById('question-counter').innerText = `${currentQuestion + 1} / 10`;

  document.getElementById('scenario-emoji').innerText = scenario.emoji;
  document.getElementById('scenario-title').innerText = scenario.title;
  document.getElementById('scenario-text').innerText = scenario.text;

  document.getElementById('ants-count').innerText = state.ants;

  const progress = ((currentQuestion) / 10) * 100;
  document.getElementById('progress-fill').style.width = `${progress}%`;

  const container = document.getElementById('options-container');
  container.innerHTML = '';

  scenario.options.forEach(option => {

    const button = document.createElement('button');

    button.className = 'option';
    button.innerText = option.label;

    button.onclick = () => selectOption(option.effects);

    container.appendChild(button);
  });

  updateFuturePreview();
}

function selectOption(effects) {

  Object.keys(effects).forEach(key => {

    if (state[key] !== undefined) {
      state[key] += effects[key];
    }
  });

  currentQuestion++;

  if (currentQuestion >= 10) {
    showResults();
  } else {
    renderQuestion();
  }
}

function updateFuturePreview() {

  const avatar = document.getElementById('future-avatar');
  const text = document.getElementById('future-text');

  if (state.discipline > state.impulse + 3) {

    avatar.innerText = '🚲📚✨';
    text.innerText = 'Tu yo del futuro empieza a construir hábitos inteligentes y metas reales.';

  } else if (state.impulse > 8) {

    avatar.innerText = '📦🐜😵';
    text.innerText = 'Las compras impulsivas están llenando tu vida de gastos hormiga.';

  } else if (state.socialPressure > 6) {

    avatar.innerText = '🧋👟💸';
    text.innerText = 'Tus decisiones están siendo controladas más por presión social que por tus metas.';

  } else {

    avatar.innerText = '🙂🌱';
    text.innerText = 'Tus hábitos todavía están en construcción. Cada decisión cuenta.';
  }
}

function showResults() {

  document.getElementById('game-screen').classList.add('hidden');
  document.getElementById('result-screen').classList.remove('hidden');

  let emoji = '🙂';
  let description = '';

  if (state.discipline > 10 && state.futureVision > 5) {

    emoji = '🚲💻🌱';
    description = 'Construyes hábitos inteligentes. Tu yo del futuro probablemente tendrá más libertad y menos estrés financiero.';

  } else if (state.impulse > 12) {

    emoji = '📦🐜😵';
    description = 'Tus gastos hormiga están creciendo rápidamente. Las pequeñas compras impulsivas se están acumulando.';

  } else if (state.socialPressure > 8) {

    emoji = '🧋👟💸';
    description = 'Gran parte de tus gastos vienen de querer encajar socialmente. Tu yo del futuro necesita más criterio propio.';

  } else {

    emoji = '🌱🙂';
    description = 'Todavía estás formando tus hábitos financieros. Con pequeños cambios puedes mejorar muchísimo.';
  }

  document.getElementById('result-emoji').innerText = emoji;
  document.getElementById('result-description').innerText = description;

  document.getElementById('final-ants').innerText = state.ants;
  document.getElementById('final-money').innerText = `$${state.money}`;
}

function restartGame() {
  startGame();
}

</script>

</body>
</html>
